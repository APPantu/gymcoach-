<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Gym Coach">
<title>Gym Coach</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --white:#ffffff;
  --off:#f7f7f5;
  --border:#ebebeb;
  --border2:#d8d8d8;
  --text:#111111;
  --text2:#555555;
  --text3:#aaaaaa;
  --accent:#1e4d2b;
  --green:#1e4d2b;
  --green-bg:#f0f5f1;
  --green-border:#b8d4c0;
  --red:#d93025;
  --yellow:#b45309;
  --radius:14px;
  --radius-sm:10px;
}
html{font-family:'Inter',-apple-system,sans-serif;}
body{background:#ffffff;color:var(--text);min-height:100vh;padding-bottom:env(safe-area-inset-bottom,24px);}
button,input,textarea,a{font-family:inherit;}
#app{max-width:430px;margin:0 auto;}

/* ── HEADER ── */
.hdr{background:var(--white);border-bottom:1px solid var(--border);padding:16px 20px 12px;position:sticky;top:0;z-index:20;}
.hdr-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.wordmark{font-size:12px;font-weight:700;letter-spacing:4px;color:var(--text);text-transform:uppercase;}
.hdr-actions{display:flex;gap:6px;align-items:center;}
.icon-btn{background:none;border:1px solid var(--border);border-radius:6px;padding:6px 12px;font-size:10px;font-weight:600;color:var(--text2);cursor:pointer;letter-spacing:1px;text-transform:uppercase;}
.icon-btn:active{background:var(--off);}
.time-chip{font-size:11px;color:var(--text3);font-variant-numeric:tabular-nums;font-weight:500;}

.day-pills{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;}
.day-pills::-webkit-scrollbar{display:none;}
.pill{padding:6px 13px;border-radius:6px;border:1px solid var(--border);background:transparent;font-size:10px;font-weight:600;color:var(--text3);cursor:pointer;white-space:nowrap;flex-shrink:0;letter-spacing:1.5px;text-transform:uppercase;transition:all 0.15s;}
.pill.on{background:#1e4d2b;color:#ffffff;border-color:#1e4d2b;}

/* ── STREAK ── */
.streak{background:#f2f7f4;color:var(--text);padding:14px;border-bottom:1px solid var(--border) 20px;display:flex;align-items:center;justify-content:space-between;}
.streak-count{font-size:24px;font-weight:800;line-height:1;font-variant-numeric:tabular-nums;}
.streak-sub{font-size:9px;font-weight:500;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin-top:2px;}
.week-dots{display:flex;gap:6px;}
.wd{width:30px;height:30px;border-radius:6px;background:var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;}
.wd.hit{background:var(--green-bg);border:1px solid var(--green-border);}
.wd.now{background:#ffffff;}
.wd-lbl{font-size:7px;font-weight:700;text-transform:uppercase;color:var(--text3);}
.wd.now .wd-lbl{color:#ffffff99;}
.wd-chk{font-size:9px;line-height:1;color:var(--text3);}
.wd.now .wd-chk{color:#ffffff;}

/* ── CONTENT ── */
.page{padding:14px 16px 32px;}

/* ── HERO ── */
.hero{background:var(--white);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:14px;display:flex;flex-direction:column;gap:14px;}
.hero-top{display:flex;align-items:flex-start;justify-content:space-between;}
.hero-left{}
.hero-day{font-size:9px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:var(--text3);margin-bottom:6px;}
.hero-name{font-size:32px;font-weight:900;color:var(--text);line-height:1;letter-spacing:-1px;}
.hero-focus{font-size:13px;font-weight:500;color:var(--text2);margin-top:4px;}
.hero-emoji{font-size:44px;line-height:1;}
.hero-stats{display:flex;gap:8px;}
.hstat{flex:1;background:var(--off);border-radius:8px;padding:10px 12px;border:1px solid var(--border);}
.hstat-val{font-size:20px;font-weight:800;color:var(--text);letter-spacing:-0.5px;}
.hstat-lbl{font-size:9px;color:var(--text3);font-weight:500;letter-spacing:1px;text-transform:uppercase;margin-top:2px;}
.start-btn{display:flex;align-items:center;justify-content:center;gap:8px;background:#1e4d2b;color:#ffffff;border:none;border-radius:12px;padding:16px;font-size:15px;font-weight:700;cursor:pointer;letter-spacing:0.3px;width:100%;}
.start-btn:active{opacity:0.85;}

/* ── SECTION ── */
.sec{margin-bottom:14px;}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;padding:0 2px;}
.sec-title{font-size:9px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;color:var(--text3);}
.sec-hint{font-size:10px;color:var(--text3);}

/* ── EXERCISE CARD ── */
.exc{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:6px;display:flex;align-items:center;gap:12px;cursor:pointer;}
.exc:active{background:var(--off);}
.exc-num{font-size:11px;font-weight:700;color:var(--text3);min-width:18px;}
.exc-body{flex:1;min-width:0;}
.exc-name{font-size:14px;font-weight:700;color:var(--text);margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.exc-tags{display:flex;gap:5px;flex-wrap:wrap;}
.tag{font-size:9px;font-weight:600;padding:2px 8px;border-radius:4px;letter-spacing:0.5px;}
.tag-muscle{background:var(--off);color:var(--text2);border:1px solid var(--border);}
.tag-sets{background:var(--green-bg);color:var(--accent);border:1px solid var(--green-border);}
.tag-weight{background:#fff8e6;color:var(--yellow);border:1px solid #f0d88a;}
.exc-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;}
.exc-edit{font-size:12px;color:var(--text3);}

/* ── WARMUP/COOLDOWN LIST ── */
.step-row{background:transparent;border:none;border-bottom:1px solid var(--border);border-radius:0;padding:11px 2px;margin-bottom:0;display:flex;align-items:center;gap:10px;}
.step-icon{font-size:11px;width:16px;text-align:center;flex-shrink:0;color:var(--text3);font-weight:700;}
.step-name{flex:1;font-size:13px;font-weight:500;color:var(--text2);}
.step-dur{font-size:12px;font-weight:700;color:var(--text3);}

/* ── WORKOUT SCREEN ── */
.wkt-hdr{background:var(--white);border-bottom:1px solid var(--border);padding:14px 20px;position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:12px;}
.back-btn{background:none;border:1px solid var(--border2);border-radius:8px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;color:var(--text);}
.wkt-hdr-info{flex:1;}
.wkt-hdr-name{font-size:15px;font-weight:800;color:var(--text);}
.wkt-hdr-sub{font-size:11px;color:var(--text3);font-variant-numeric:tabular-nums;}
.wkt-hdr-elapsed{font-size:13px;font-weight:700;color:var(--text2);font-variant-numeric:tabular-nums;}

/* ── PHASE CARDS ── */
.phase-card{background:var(--white);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:14px;}
.phase-label{font-size:9px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;color:var(--text3);margin-bottom:6px;}
.phase-title{font-size:20px;font-weight:700;color:var(--text);line-height:1.25;margin-bottom:14px;}
.phase-subtitle{font-size:13px;color:var(--text2);margin-bottom:14px;}

/* ── TIMER RING ── */
.ring-wrap{display:flex;justify-content:center;margin:8px 0 16px;}

/* ── SETS ── */
.set-list{display:flex;flex-direction:column;gap:6px;margin:12px 0;}
.set-row{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--white);}
.set-row.cur{background:var(--white);border-color:#1e4d2b;box-shadow:0 1px 6px #0000000a;}
.set-row.done{opacity:0.38;}
.set-lbl{font-size:12px;font-weight:700;color:var(--text3);min-width:58px;}
.set-lbl.cur{color:var(--text);}
.set-inp{flex:1;border:none;background:transparent;font-size:20px;font-weight:800;color:var(--text);text-align:center;outline:none;font-family:inherit;}
.set-unit{font-size:12px;font-weight:600;color:var(--text3);}
.set-done-icon{font-size:15px;min-width:20px;text-align:center;}

/* ── COMPLETE BTN ── */
.complete-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:17px;border-radius:14px;background:#1e4d2b;color:#ffffff;border:none;font-size:15px;font-weight:700;cursor:pointer;margin-top:4px;letter-spacing:0.2px;}
.complete-btn:active{opacity:0.85;}

/* ── REST BLOCK ── */
.rest-block{background:var(--off);border:1px solid var(--border);border-radius:12px;padding:16px;margin:12px 0;}
.rest-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.rest-time{font-size:36px;font-weight:900;color:var(--text);font-variant-numeric:tabular-nums;line-height:1;}
.rest-lbl{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);margin-top:2px;}
.rest-actions{display:flex;gap:6px;}
.rest-btn{border:1px solid var(--border2);border-radius:8px;background:var(--white);padding:8px 12px;font-size:12px;font-weight:700;color:var(--text2);cursor:pointer;}
.rest-bar-wrap{height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
.rest-bar{height:100%;background:var(--text);border-radius:2px;transition:width 0.5s linear;}
.rest-hint{font-size:11px;color:var(--text3);margin-top:8px;text-align:center;}

/* ── PROGRESS LIST ── */
.prog-list{display:flex;flex-direction:column;gap:5px;}
.prog-row{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--radius-sm);border:1px solid transparent;}
.prog-row.cur{background:var(--off);border:1px solid var(--border);border-radius:8px;}
.prog-idx{font-size:11px;font-weight:700;color:var(--text3);min-width:18px;}
.prog-name{flex:1;font-size:13px;font-weight:500;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.prog-row.cur .prog-name{color:var(--text);font-weight:700;}
.prog-row.hit .prog-name{color:var(--text3);}
.prog-meta{font-size:11px;color:var(--text3);}

/* ── STRETCH ── */
.stretch-item{display:flex;align-items:center;gap:12px;padding:11px 2px;border:none;border-bottom:1px solid var(--border);background:transparent;margin-bottom:0;border-radius:0;}
.stretch-item.cur{background:var(--white);border-color:#1e4d2b;}
.stretch-item.hit{opacity:0.35;}
.stretch-ico{font-size:11px;width:16px;text-align:center;color:var(--text3);font-weight:700;}
.stretch-txt{flex:1;font-size:13px;font-weight:500;color:var(--text2);}
.stretch-item.cur .stretch-txt{color:var(--text);font-weight:600;}
.stretch-t{font-size:12px;font-weight:700;color:var(--text3);}

/* ── DONE ── */
.done-wrap{text-align:center;padding:36px 20px;}
.done-trophy{font-size:64px;margin-bottom:16px;}
.done-headline{font-size:26px;font-weight:800;color:var(--text);margin-bottom:4px;letter-spacing:-0.5px;}
.done-streak{font-size:56px;font-weight:900;color:var(--accent);line-height:1;margin:8px 0 4px;letter-spacing:-2px;}
.done-streak-lbl{font-size:12px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--text3);margin-bottom:20px;}
.done-info{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:left;margin-bottom:20px;}
.done-info-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border);}
.done-info-row:last-child{border:none;}
.done-info-lbl{font-size:12px;color:var(--text3);}
.done-info-val{font-size:13px;font-weight:700;color:var(--text);}
.done-tip{background:var(--green-bg);border:1px solid var(--green-border);border-radius:12px;padding:14px;text-align:left;margin-bottom:20px;}
.done-tip-title{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--green);margin-bottom:6px;}
.done-tip-body{font-size:13px;color:#2d4a2d;line-height:1.8;}

/* ── HISTORY ── */
.hist-item{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:8px;}
.hist-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.hist-name{font-size:14px;font-weight:700;color:var(--text);}
.hist-date{font-size:11px;color:var(--text3);}
.hist-meta{font-size:12px;color:var(--text2);margin-bottom:8px;}
.hist-weights{display:flex;flex-wrap:wrap;gap:5px;}
.hw{font-size:10px;font-weight:600;padding:2px 8px;border-radius:4px;background:var(--off);color:var(--text2);border:1px solid var(--border);}

/* ── MODALS ── */
.overlay{position:fixed;inset:0;background:#00000025;z-index:100;display:flex;align-items:flex-end;justify-content:center;}
.sheet{background:var(--white);border-radius:16px 16px 0 0;padding:22px;width:100%;max-width:430px;max-height:88vh;overflow-y:auto;}
.sheet-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px;}
.sheet-close{background:none;border:none;color:var(--text3);font-size:20px;cursor:pointer;padding:2px;}
.sheet-lbl{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);margin-bottom:3px;}
.sheet-title{font-size:18px;font-weight:800;color:var(--text);}
.field-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.field label{display:block;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text3);margin-bottom:5px;}
.field input,.field textarea{width:100%;background:var(--off);border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-size:16px;font-weight:700;outline:none;}
.field input:focus,.field textarea:focus{border-color:#1e4d2b;}
.sheet-btns{display:flex;gap:8px;}
.btn-cancel{flex:1;padding:14px;border-radius:10px;border:1px solid var(--border2);background:transparent;color:var(--text2);font-size:14px;font-weight:600;cursor:pointer;}
.btn-confirm{flex:2;padding:14px;border-radius:10px;border:none;background:#1e4d2b;color:#ffffff;font-size:14px;font-weight:700;cursor:pointer;}

.media-img{width:100%;max-height:200px;object-fit:contain;border-radius:10px;background:var(--off);margin-bottom:12px;display:block;}
.media-stats{display:flex;gap:6px;margin-bottom:14px;}
.mstat{flex:1;background:var(--off);border-radius:8px;padding:8px 6px;text-align:center;border:1px solid var(--border);}
.mstat-v{font-size:14px;font-weight:800;color:var(--text);}
.mstat-l{font-size:9px;color:var(--text3);margin-top:1px;font-weight:500;}
.yt-link{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px;border-radius:10px;background:#ff0000;color:#fff;font-size:14px;font-weight:700;text-decoration:none;}

.sync-tabs{display:flex;gap:6px;margin-bottom:14px;}
.sync-tab{flex:1;padding:9px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text3);font-size:12px;font-weight:700;cursor:pointer;}
.sync-tab.on{background:#1e4d2b;color:#ffffff;border-color:#1e4d2b;}
.export-pre{background:var(--off);border:1px solid var(--border);border-radius:8px;padding:12px;max-height:150px;overflow-y:auto;font-family:monospace;font-size:9px;color:var(--text3);white-space:pre-wrap;word-break:break-all;margin-bottom:12px;}
.import-ta{width:100%;background:var(--off);border:1px solid var(--border);border-radius:8px;padding:12px;color:var(--text);font-size:11px;font-family:monospace;resize:none;outline:none;min-height:120px;margin-bottom:10px;}
.msg{font-size:11px;font-weight:700;margin-bottom:10px;}
.msg.ok{color:var(--green);}
.msg.err{color:var(--red);}

.full-btn{display:block;width:100%;padding:15px;border-radius:12px;background:#1e4d2b;color:#ffffff;border:none;font-size:14px;font-weight:700;cursor:pointer;letter-spacing:0.2px;}
.full-btn:active{opacity:0.85;}
.outline-btn{background:transparent;border:1.5px solid var(--border2);color:var(--text2);}
</style>
</head>

// ─── STORAGE ─────────────────────────────────────────────────────────────────
function ld(k,d){try{const r=localStorage.getItem(k);if(r)return JSON.parse(r);}catch(_){}return d;}
function sv(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(_){}}
let plan=ld('gc3_plan',JSON.parse(JSON.stringify(DEF)));
let history=ld('gc3_hist',[]);
function splan(){sv('gc3_plan',plan);}
function shist(){sv('gc3_hist',history.slice(-90));}

// ─── STREAK ──────────────────────────────────────────────────────────────────
function streak(h){
  if(!h.length)return 0;
  const ds=[...new Set(h.map(s=>s.date))].sort().reverse();
  const td=new Date().toLocaleDateString('es-AR');
  const yd=new Date(Date.now()-86400000).toLocaleDateString('es-AR');
  if(ds[0]!==td&&ds[0]!==yd)return 0;
  let n=ds[0]===td?1:0,chk=new Date(Date.now()-86400000);
  for(let i=ds[0]===td?1:0;i<ds.length;i++){
    if(ds[i]===chk.toLocaleDateString('es-AR')){n++;chk=new Date(chk-86400000);}else break;
  }
  return n;
}
function weekDots(h){
  const dl=['D','L','M','M','J','V','S'],td=new Date();
  return Array.from({length:7},(_,i)=>{
    const d=new Date(td);d.setDate(td.getDate()-(6-i));
    return{l:dl[d.getDay()],hit:h.some(s=>s.date===d.toLocaleDateString('es-AR')),now:i===6};
  });
}

let timer=0,tTotal=0,elapsed=0,setsDone=0;

let tInt=null,elInt=null,rInt=null;
let editIdx=null,mediaIdx=null,showCloud=false,cTab='export';

function ft(s){return Math.floor(s/60)+':'+(s%60).toString().padStart(2,'0');}
function tds(){return new Date().toLocaleDateString('es-AR');}

// ─── TIMERS ──────────────────────────────────────────────────────────────────
function startT(s){
  clearInterval(tInt);timer=s;tTotal=s;running=true;
  tInt=setInterval(()=>{timer--;if(timer<=0){clearInterval(tInt);running=false;onTE();}else render();},1000);
}
function pauseT(){
  if(running){clearInterval(tInt);running=false;render();}
  else{tInt=setInterval(()=>{timer--;if(timer<=0){clearInterval(tInt);running=false;onTE();}else render();},1000);running=true;render();}
}
function skipT(){clearInterval(tInt);running=false;timer=0;onTE();}

function startRest(s){
  clearInterval(rInt);restT=s;restTot=s;restRun=true;
  rInt=setInterval(()=>{
    restT--;
    const b=document.getElementById('rb'),n=document.getElementById('rn');
    if(b)b.style.width=(restT/restTot*100)+'%';
    if(n)n.textContent=ft(restT);
    if(restT<=0){clearInterval(rInt);restRun=false;skipRest();}
  },1000);
}
function skipRest(){clearInterval(rInt);restRun=false;restT=0;phase='workout';render();}
function pauseRest(){
  if(restRun){clearInterval(rInt);restRun=false;render();}
  else{rInt=setInterval(()=>{restT--;const b=document.getElementById('rb'),n=document.getElementById('rn');if(b)b.style.width=(restT/restTot*100)+'%';if(n)n.textContent=ft(restT);if(restT<=0){clearInterval(rInt);restRun=false;skipRest();}},1000);restRun=true;render();}
}

function startEl(){clearInterval(elInt);elapsed=0;elInt=setInterval(()=>{elapsed++;const e=document.getElementById('el');if(e)e.textContent=ft(elapsed);},1000);}
function stopEl(){clearInterval(elInt);}

function onTE(){
  const wo=plan[sel];
  if(phase==='warmup'){const nx=wuIdx+1;if(nx<wo.warmup.length){wuIdx=nx;render();startT(wo.warmup[nx].dur);}else{phase='workout';exIdx=0;setIdx=0;initSW();render();}}
  else if(phase==='cooldown'){const nx=cdIdx+1;if(nx<wo.cooldown.length){cdIdx=nx;render();startT(wo.cooldown[nx].dur);}else{finish();}}
}

function initSW(){const wo=plan[sel];sw={};wo.exercises.forEach((e,i)=>{sw[i]=Array.from({length:e.sets},()=>e.weight||0);});}

function startWarmup(){
  phase='warmup';wuIdx=0;exIdx=0;setIdx=0;setsDone=0;sw={};
  view='workout';render();startEl();startT(plan[sel].warmup[0].dur);
}

function readSW(){document.querySelectorAll('.set-inp').forEach((inp,i)=>{if(sw[exIdx])sw[exIdx][i]=parseFloat(inp.value)||0;});}

function completeSet(){
  readSW();
  const w=sw[exIdx]?sw[exIdx][setIdx]:0;
  if(w>0)plan[sel].exercises[exIdx].weight=w;
  splan();
  const wo=plan[sel],ex=wo.exercises[exIdx];
  setsDone++;
  const ns=setIdx+1;
  if(ns<ex.sets){setIdx=ns;phase='rest';render();startRest(ex.rest);}
  else{const ne=exIdx+1;if(ne<wo.exercises.length){exIdx=ne;setIdx=0;phase='rest';render();startRest(ex.rest);}else{phase='cooldown';cdIdx=0;render();startT(plan[sel].cooldown[0].dur);}}
}

function finish(){
  stopEl();phase='done';
  const wts={};Object.keys(sw).forEach(i=>{const v=(sw[i]||[]).filter(x=>x>0);if(v.length)wts[plan[sel].exercises[i].name]=Math.max(...v);});
  history.push({date:tds(),dayIdx:sel,duration:elapsed,setsCompleted:setsDone,weights:wts});
  shist();render();
}

// ─── SVG RING ────────────────────────────────────────────────────────────────
function ring(s,tot){
  const r=52,c=2*Math.PI*r,d=c*(tot>0?s/tot:0);
  return `<svg width="136" height="136" viewBox="0 0 120 120">
    <circle cx="60" cy="60" r="${r}" fill="none" stroke="#ebebeb" stroke-width="8"/>
    <circle cx="60" cy="60" r="${r}" fill="none" stroke="#1e4d2b" stroke-width="8"
      stroke-dasharray="${d} ${c}" stroke-linecap="round" transform="rotate(-90 60 60)"
      style="transition:stroke-dasharray 0.5s linear"/>
    <text x="60" y="56" text-anchor="middle" fill="#1e4d2b" font-size="21" font-weight="800" font-family="Inter,sans-serif">${ft(s)}</text>
    <text x="60" y="72" text-anchor="middle" fill="#aaa" font-size="9" font-family="Inter,sans-serif">restante</text>
  </svg>`;
}

        </div>
        ${hasM?`<button onclick="openM(${exIdx})" style="display:flex;align-items:center;gap:6px;background:none;border:1px solid #ffd0d0;border-radius:8px;padding:8px 14px;color:#d93025;font-size:12px;font-weight:600;cursor:pointer;margin-bottom:12px">
          <svg width="14" height="10" viewBox="0 0 22 16"><rect width="22" height="16" rx="4" fill="#d93025"/><polygon points="9,4 9,12 16,8" fill="white"/></svg>
          Ver cómo se hace
        </button>`:''}
        <button class="complete-btn" onclick="completeSet()">
          Serie ${setIdx+1} completada
        </button>
      </div>
      <div class="phase-card">
        <div class="phase-label" style="margin-bottom:10px">Progreso</div>
        <div class="prog-list">
          ${wo.exercises.map((e,i)=>`
            <div class="prog-row${i===exIdx?' cur':''}${i<exIdx?' hit':''}">
              <div class="prog-idx">${i<exIdx?'✓':i+1}</div>
              <div class="prog-name">${e.name}</div>
              <div class="prog-meta">${e.sets}×${e.reps}${e.weight>0?' · '+e.weight+'kg':''}</div>
            </div>`).join('')}
        </div>
      </div>`;

    } else if(phase==='rest'){
      const pct=restTot>0?(restT/restTot*100):0;
      const nx=wo.exercises[exIdx];
      body=`<div class="phase-card">
        <div class="phase-label">Descanso</div>
        <div class="phase-title" style="font-size:16px;font-weight:600;color:var(--text2);margin-bottom:12px">Próximo: ${nx?.name||'último'}</div>
        <div class="rest-block">
          <div class="rest-top">
            <div>
              <div class="rest-time" id="rn">${ft(restT)}</div>
              <div class="rest-lbl">Descanso</div>
            </div>
            <div class="rest-actions">
              <button class="rest-btn" onclick="pauseRest()">${restRun?'⏸':'▶'}</button>
              <button class="rest-btn" onclick="skipRest()">Skip</button>
            </div>
          </div>
          <div class="rest-bar-wrap"><div class="rest-bar" id="rb" style="width:${pct}%"></div></div>
          <div class="rest-hint">Respirá · Tomá agua</div>
        </div>
        <button class="full-btn outline-btn" onclick="skipRest()">Siguiente ejercicio</button>
      </div>
      <div class="phase-card">
        <div class="phase-label" style="margin-bottom:10px">Progreso</div>
        <div class="prog-list">
          ${wo.exercises.map((e,i)=>`
            <div class="prog-row${i===exIdx?' cur':''}${i<exIdx?' hit':''}">
              <div class="prog-idx">${i<exIdx?'✓':i+1}</div>
              <div class="prog-name">${e.name}</div>
              <div class="prog-meta">${e.sets}×${e.reps}${e.weight>0?' · '+e.weight+'kg':''}</div>
            </div>`).join('')}
        </div>
      </div>`;

    } else if(phase==='cooldown'){
      const item=wo.cooldown[cdIdx];
      body=`<div class="phase-card">
        <div class="phase-label">Elongación · ${cdIdx+1}/${wo.cooldown.length}</div>
        <div class="phase-title">${item.icon} ${item.name}</div>
        <div class="ring-wrap">${ring(timer,item.dur)}</div>
        <div style="color:var(--text3);font-size:13px;text-align:center;margin-bottom:14px">Mantené sin rebotar · respirá lento</div>
        <button class="full-btn outline-btn" style="margin-bottom:16px" onclick="skipT()">Siguiente</button>
        <div style="display:flex;flex-direction:column;gap:5px">
          ${wo.cooldown.map((c,i)=>`
            <div class="stretch-item${i===cdIdx?' cur':''}${i<cdIdx?' hit':''}">
              <span class="stretch-ico">${c.icon}</span>
              <span class="stretch-txt">${i<cdIdx?'✓  ':''}${c.name}</span>
              <span class="stretch-t">${ft(c.dur)}</span>
            </div>`).join('')}
        </div>
      </div>`;

    } else if(phase==='done'){
      const ns=streak(history);
      body=`<div class="done-wrap">
        
        <div class="done-headline">¡Listo, crack!</div>
        <div class="done-streak">${ns}</div>
        <div class="done-streak-lbl">días de racha</div>
        <div class="done-info">
          <div class="done-info-row"><span class="done-info-lbl">Duración</span><span class="done-info-val">${ft(elapsed)}</span></div>
          <div class="done-info-row"><span class="done-info-lbl">Series completadas</span><span class="done-info-val">${setsDone}</span></div>
          <div class="done-info-row"><span class="done-info-lbl">Día</span><span class="done-info-val">${wo.name}</span></div>
        </div>
        <div class="done-tip">
          <div class="done-tip-title">Ahora hacé</div>
          <div class="done-tip-body">— 500ml de agua<br>— Comida en 30–45 min<br>— Proteína + carbohidrato</div>
        </div>
        <button class="full-btn" onclick="goHome()">Volver al inicio</button>
      </div>`;
    }

    app.innerHTML=`
    <div class="wkt-hdr">
      <button class="back-btn" onclick="goHome()">‹</button>
      <div class="wkt-hdr-info">
        <div class="wkt-hdr-name">${wo.name}</div>
        <div class="wkt-hdr-sub">${wo.focus}</div>
      </div>
      <div class="wkt-hdr-elapsed" id="el">${ft(elapsed)}</div>
    </div>
    <div class="page">${body}</div>`+modals();
    return;
  }

  // HOME
  app.innerHTML=`
  <div class="hdr">
    <div class="hdr-top">
      <div class="wordmark">Gym Coach</div>
      <div class="hdr-actions">
        <button class="icon-btn" onclick="goHistory()">Historial</button>
        <button class="icon-btn" onclick="openCloud()">Sync</button>
        <span class="time-chip">${now}</span>
      </div>
    </div>
    <div class="day-pills">
      ${[0,1,2,3,4].map(i=>`<button class="pill${sel===i?' on':''}" onclick="selDay(${i})">${dn[i]}</button>`).join('')}
    </div>
  </div>
  <div class="streak">
    <div>
      <div style="display:flex;align-items:baseline;gap:6px">
        <span class="streak-count">${str}</span>
        <span style="font-size:13px;color:var(--text3)">${str===1?'día':'días'}</span>
      </div>
      <div class="streak-sub">Racha</div>
    </div>
    <div class="week-dots">
      ${dots.map(d=>`<div class="wd${d.hit?' hit':''}${d.now?' now':''}"><span class="wd-lbl">${d.l}</span><span class="wd-chk">${d.hit?'✓':''}</span></div>`).join('')}
    </div>
  </div>
  <div class="page">
    <div class="hero">
      <div class="hero-top">
        <div class="hero-left">
          <div class="hero-day">${dn[sel]} · Día ${sel+1} de 5</div>
          <div class="hero-name">${wo.name}</div>
          <div class="hero-focus">${wo.focus}</div>
        </div>
        
      </div>
      <div class="hero-stats">
        <div class="hstat"><div class="hstat-val">${wo.exercises.length}</div><div class="hstat-lbl">ejercicios</div></div>
        <div class="hstat"><div class="hstat-val">${wo.exercises.reduce((a,e)=>a+e.sets,0)}</div><div class="hstat-lbl">series totales</div></div>
        <div class="hstat"><div class="hstat-val">~${Math.round(wo.exercises.reduce((a,e)=>a+e.sets*(e.rest+45),0)/60)+5}m</div><div class="hstat-lbl">duración est.</div></div>
      </div>
      ${tdToday?`<div style="background:var(--green-bg);border:1px solid var(--green-border);border-radius:10px;padding:10px 14px;font-size:13px;font-weight:600;color:var(--green);text-align:center">Ya entrenaste hoy</div>`:''}
      <button class="start-btn" onclick="startWarmup()">
        <span>▶</span> Empezar entreno
      </button>
    </div>

    <div class="sec">
      <div class="sec-hdr"><span class="sec-title">${wo.warmupTitle}</span></div>
      ${wo.warmup.map(w=>`<div class="step-row"><span class="step-icon">${w.icon}</span><span class="step-name">${w.name}</span><span class="step-dur">${ft(w.dur)}</span></div>`).join('')}
    </div>

    <div class="sec">
      <div class="sec-hdr"><span class="sec-title">Ejercicios</span><span class="sec-hint">▶ ver · ✏️ editar</span></div>
      ${wo.exercises.map((ex,i)=>`
        <div class="exc">
          <div class="exc-num">${i+1}</div>
          <div class="exc-body" onclick="openMH(${i})">
            <div class="exc-name">${ex.name}</div>
            <div class="exc-tags">
              <span class="tag tag-muscle">${ex.muscle||''}</span>
              <span class="tag tag-sets">${ex.sets}×${ex.reps}</span>
              ${ex.weight>0?`<span class="tag tag-weight">${ex.weight}kg</span>`:''}
              <span class="tag tag-muscle">${ex.rest}s desc</span>
            </div>
          </div>
          <div class="exc-right">
            <span style="font-size:16px;cursor:pointer" onclick="openMH(${i})">▶</span>
            <span class="exc-edit" onclick="openEdit(${i})">✏️</span>
          </div>
        </div>`).join('')}
    </div>

    <div class="sec">
      <div class="sec-hdr"><span class="sec-title">Elongación post-entreno</span></div>
      ${wo.cooldown.map(c=>`<div class="step-row"><span class="step-icon">${c.icon}</span><span class="step-name">${c.name}</span><span class="step-dur">${ft(c.dur)}</span></div>`).join('')}
    </div>
  </div>`+modals();
}

function modals(){
  let o='';
  if(editIdx!==null){
    const ex=plan[sel].exercises[editIdx];
    o+=`<div class="overlay" onclick="closeEdit()"><div class="sheet" onclick="event.stopPropagation()">
      <div class="sheet-hdr">
        <div><div class="sheet-lbl">Editar ejercicio</div><div class="sheet-title">${ex.name}</div></div>
        <button class="sheet-close" onclick="closeEdit()">✕</button>
      </div>
      <div class="field-grid">
        <div class="field"><label>Peso base (kg)</label><input id="ew" type="number" step="2.5" value="${ex.weight||0}"></div>
        <div class="field"><label>Descanso (seg)</label><input id="er" type="number" step="15" value="${ex.rest}"></div>
        <div class="field"><label>Series</label><input id="es" type="number" step="1" value="${ex.sets}"></div>
        <div class="field"><label>Reps</label><input id="ep" type="text" value="${ex.reps}"></div>
      </div>
      <div class="sheet-btns"><button class="btn-cancel" onclick="closeEdit()">Cancelar</button><button class="btn-confirm" onclick="saveEdit()">Guardar</button></div>
    </div></div>`;
  }
  if(mediaIdx!==null){
    const ex=plan[sel].exercises[mediaIdx];
    const med=M[ex.name];
    o+=`<div class="overlay" onclick="closeM()"><div class="sheet" onclick="event.stopPropagation()">
      <div class="sheet-hdr"><div class="sheet-title" style="flex:1;padding-right:10px">${ex.name}</div><button class="sheet-close" onclick="closeM()">✕</button></div>
      ${med?`<img class="media-img" src="${med.gif}" onerror="this.style.display='none'">`:``}
      <div class="media-stats">
        ${[['Series',ex.sets],['Reps',ex.reps],['Desc.',ex.rest+'s'],...(ex.weight>0?[['Peso',ex.weight+'kg']]:[])].map(([l,v])=>`<div class="mstat"><div class="mstat-v">${v}</div><div class="mstat-l">${l}</div></div>`).join('')}
      </div>
      ${med?`<a class="yt-link" href="${med.yt}" target="_blank"><svg width="18" height="13" viewBox="0 0 22 16"><rect width="22" height="16" rx="4" fill="#fff"/><polygon points="9,4 9,12 16,8" fill="#ff0000"/></svg>Ver en YouTube</a>`:''}
    </div></div>`;
  }
  if(showCloud){
    const exp=JSON.stringify({version:4,exportedAt:new Date().toISOString(),plan,history},null,2);
    o+=`<div class="overlay" onclick="closeCloud()"><div class="sheet" onclick="event.stopPropagation()">
      <div class="sheet-hdr"><div><div class="sheet-lbl">Sync con Claude</div><div class="sheet-title">Exportar / Importar</div></div><button class="sheet-close" onclick="closeCloud()">✕</button></div>
      <div class="sync-tabs">
        <button class="sync-tab${cTab==='export'?' on':''}" onclick="sCTab('export')">Exportar</button>
        <button class="sync-tab${cTab==='import'?' on':''}" onclick="sCTab('import')">Importar</button>
      </div>
      ${cTab==='export'?`
        <p style="font-size:12px;color:var(--text2);margin-bottom:10px;line-height:1.6">Copiá este código y pegáselo a Claude con lo que querés cambiar.</p>
        <div class="export-pre">${exp}</div>
        <button class="full-btn" onclick="copyExp()">Copiar código</button>
      `:`
        <p style="font-size:12px;color:var(--text2);margin-bottom:10px">Pegá acá el código que te mandó Claude.</p>
        <textarea class="import-ta" id="it" placeholder="Pegá el JSON acá..."></textarea>
        <div id="im"></div>
        <button class="full-btn" onclick="doImport()">Importar datos</button>
      `}
    </div></div>`;
  }
  return o;
}

// ─── ACTIONS ─────────────────────────────────────────────────────────────────
function selDay(i){sel=i;phase='idle';view='home';render();}
function goHome(){view='home';phase='idle';stopEl();clearInterval(rInt);render();}
function goHistory(){view='history';render();}
function openEdit(i){editIdx=i;render();}
function closeEdit(){editIdx=null;render();}
function saveEdit(){
  const w=parseFloat(document.getElementById('ew').value)||0;
  const r=parseInt(document.getElementById('er').value)||60;
  const s=parseInt(document.getElementById('es').value)||3;
  const p=document.getElementById('ep').value||'8';
  plan[sel].exercises[editIdx]={...plan[sel].exercises[editIdx],weight:w,rest:r,sets:s,reps:p};
  splan();editIdx=null;render();
}
function openMH(i){mediaIdx=i;render();}
function openM(i){readSW();mediaIdx=i;render();}
function closeM(){mediaIdx=null;render();}
function openCloud(){showCloud=true;cTab='export';render();}
function closeCloud(){showCloud=false;render();}
function sCTab(t){cTab=t;render();}
function copyExp(){
  navigator.clipboard.writeText(JSON.stringify({version:4,exportedAt:new Date().toISOString(),plan,history},null,2)).then(()=>{
    const b=document.querySelector('.sheet .full-btn');if(b){const o=b.textContent;b.textContent='Copiado';setTimeout(()=>b.textContent=o,2000);}
  });
}
function doImport(){
  const t=document.getElementById('it').value.trim(),m=document.getElementById('im');
  try{
    const p=JSON.parse(t);if(!p.plan||!p.history)throw 0;
    plan=p.plan;history=p.history;splan();shist();
    m.className='msg ok';m.textContent='Importado correctamente';
    setTimeout(()=>{showCloud=false;render();},1200);
  }catch(_){m.className='msg err';m.textContent='⚠️ Código inválido.';}
}

setInterval(()=>{const c=document.querySelector('.time-chip');if(c)c.textContent=new Date().toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'});},10000);
render();
</script>
</body>
</html>
